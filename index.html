<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>hermes-webui</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('hermes-theme');
          var isDark = true;
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && typeof parsed === 'object' && parsed.state && typeof parsed.state.isDarkMode === 'boolean') {
              isDark = parsed.state.isDarkMode;
            }
          }
          var cls = document.documentElement.classList;
          if (isDark) cls.add('dark'); else cls.remove('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
